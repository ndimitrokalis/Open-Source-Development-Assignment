<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Sign In — LibreHelp</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="stylesheet" href="{{ url_for('static', filename='css/login.css') }}"/>
</head>
<body>

<div class="wrap">

  <div class="left">
    <div class="brand">
      <div class="logo">
        <svg viewBox="0 0 24 24" fill="none">
          <path d="M12 2C8.13 2 5 5.13 5 9c0 2.29 1.1 4.33 2.79 5.62L7 18h10l-.79-3.38C17.9 13.33 19 11.29 19 9c0-3.87-3.13-7-7-7z" fill="white"/>
          <rect x="9" y="18" width="6" height="2" rx="1" fill="white"/>
        </svg>
      </div>
      <span class="brand-name">LibreHelp</span>
    </div>

    <h1>Welcome back</h1>
    <p class="sub">Sign in to your support account</p>

    <div id="alert-box" class="alert"></div>

    <form id="login-form" novalidate>
      <div class="field">
        <label>Username or Email</label>
        <input type="text" id="identifier" placeholder="you@example.com" autocomplete="username" required/>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required/>
          <button type="button" class="pw-eye" onclick="togglePw('password')" aria-label="Toggle password">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="extras">
        <label class="remember" id="rem-label">
          <input type="checkbox" id="remember"/>
          <span class="chk-box" id="rem-box"></span>
          Remember me
        </label>
        <a href="#" class="forgot">Forgot password?</a>
      </div>

      <button type="submit" class="btn" id="submit-btn">
        <span id="btn-text">Sign In</span>
        <span class="spinner" id="spinner"></span>
      </button>
    </form>

    <p class="footer-link">
      Don't have an account? <a href="{{ url_for('auth.register') }}">Create one free</a>
    </p>
  </div>

</div>

<script src="{{ url_for('static', filename='js/login.js') }}"></script>

</body>
</html>
